        <h3 class="widget-title" style="margin-bottom: 16px;">Preferences</h3>
        <div style="display:flex; flex-direction:column; gap:8px;">
            <button class="nav-item active" style="width:100%; text-align:left; background: var(--gradient-soft); color: var(--primary);">Profile Settings</button>

    </div>

    <!-- SETTINGS CONTENT AREA -->
    <div class="widget" style="padding: 32px;">
        <h2 style="font-size: 1.4rem; font-weight: 700; margin-bottom: 24px;">Profile Settings</h2>
        
        <div style="display:flex; gap: 24px; align-items:center; margin-bottom: 32px;">
            <div class="sidebar-avatar" style="width: 80px; height: 80px; font-size: 1.8rem; border-radius: 20px;">SA</div>
            <div>
                <button class="btn-card-action primary-action" style="padding: 8px 16px; margin-bottom:8px;">Upload New Avatar</button>
                <p style="font-size:0.8rem; color:var(--text-muted);">Recommended size: 256x256px. Max 2MB.</p>
            </div>
        </div>

        <form>
            <div class="form-row" style="margin-bottom: 20px;">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" value="Sarah">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" value="Anderson">
                </div>
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label>Email Address</label>
                <input type="email" value="sarah@coachflow.com">
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label>Job Title / Role</label>
                <input type="text" value="Head Coach">
            </div>
            <div class="form-group" style="margin-bottom: 32px;">
                <label>Bio</label>
                <textarea style="height: 100px;">Helping leaders unlock their peak potential and transition into impactful roles.</textarea>
            </div>
            <button class="btn-card-action primary-action" type="button" style="padding: 10px 24px; font-size: 0.9rem;">Save Changes</button>
        </form>
    </div>
</div>
